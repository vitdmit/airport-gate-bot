name: airport-gate-bot

on:
  schedule:
    # GitHub uses UTC. The guard below keeps DME to one snapshot per
    # 10-minute bucket and SVO/VKO to one snapshot per hour.
    - cron: "*/10 * * * *"
  repository_dispatch:
    types:
      - hourly_collect
  workflow_dispatch:
    inputs:
      mode:
        description: "collect, report, or all"
        required: false
        default: "all"
        type: choice
        options:
          - collect
          - report
          - all
      report_date:
        description: "YYYY-MM-DD, today, or yesterday"
        required: false
        default: "yesterday"
      airports:
        description: "Airports to collect when mode is collect/all"
        required: false
        default: "SVO,VKO,DME"

permissions:
  contents: write

concurrency:
  group: airport-gate-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh repository before checks
        shell: bash
        run: git pull --ff-only origin "${GITHUB_REF_NAME:-main}"

      - name: Decide whether this interval needs snapshots
        id: collect_guard
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          MODE="${{ github.event.inputs.mode }}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$MODE" = "collect" ] || [ "$MODE" = "all" ] || [ -z "$MODE" ]; then
              echo "run_collect=true" >> "$GITHUB_OUTPUT"
              echo "collect_airports=${{ github.event.inputs.airports }}" >> "$GITHUB_OUTPUT"
            else
              echo "run_collect=false" >> "$GITHUB_OUTPUT"
              echo "collect_airports=" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          DAY="$(TZ=Europe/Moscow date +'%Y-%m-%d')"
          STAMP_DAY="$(TZ=Europe/Moscow date +'%Y%m%d')"
          HOUR="$(TZ=Europe/Moscow date +'%H')"
          MINUTE="$(TZ=Europe/Moscow date +'%M')"
          BUCKET_MINUTE="$(printf '%02d' $((10#${MINUTE} / 10 * 10)))"
          HOUR_STAMP="${STAMP_DAY}_${HOUR}"
          BUCKET_STAMP="${STAMP_DAY}_${HOUR}${BUCKET_MINUTE}"
          COLLECT_AIRPORTS=()

          if compgen -G "data/raw/${DAY}/DME_${BUCKET_STAMP}*.json" > /dev/null; then
            echo "DME snapshot already exists for Moscow 10-minute bucket ${BUCKET_STAMP}."
          else
            COLLECT_AIRPORTS+=("DME")
            echo "No DME snapshot for Moscow 10-minute bucket ${BUCKET_STAMP}; collecting DME."
          fi

          for AIRPORT in SVO VKO; do
            if compgen -G "data/raw/${DAY}/${AIRPORT}_${HOUR_STAMP}*.json" > /dev/null; then
              echo "${AIRPORT} snapshot already exists for Moscow hour ${HOUR_STAMP}."
            else
              COLLECT_AIRPORTS+=("${AIRPORT}")
              echo "No ${AIRPORT} snapshot for Moscow hour ${HOUR_STAMP}; collecting."
            fi
          done

          if [ "${#COLLECT_AIRPORTS[@]}" -eq 0 ]; then
            echo "run_collect=false" >> "$GITHUB_OUTPUT"
            echo "collect_airports=" >> "$GITHUB_OUTPUT"
          else
            AIRPORTS_CSV="$(IFS=,; echo "${COLLECT_AIRPORTS[*]}")"
            echo "run_collect=true" >> "$GITHUB_OUTPUT"
            echo "collect_airports=${AIRPORTS_CSV}" >> "$GITHUB_OUTPUT"
            echo "Collect airports: ${AIRPORTS_CSV}"
          fi

      - name: Decide whether to build the daily report
        id: daily_guard
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          EVENT_SCHEDULE="${{ github.event.schedule }}"
          MODE="${{ github.event.inputs.mode }}"
          RUN_REPORT="false"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$MODE" = "report" ] || [ "$MODE" = "all" ]; then
              RUN_REPORT="true"
            fi
          elif [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "repository_dispatch" ]; then
            MOSCOW_HOUR="$(TZ=Europe/Moscow date +'%H')"
            REPORT_DATE="$(TZ=Europe/Moscow date -d 'yesterday' +'%Y-%m-%d')"
            REPORT_PATH="outputs/gate_report_${REPORT_DATE}_daily.xlsx"

            if [ "$MOSCOW_HOUR" = "09" ] && [ ! -f "$REPORT_PATH" ]; then
              RUN_REPORT="true"
            fi
          fi

          echo "run_report=${RUN_REPORT}" >> "$GITHUB_OUTPUT"
          echo "Daily report needed: ${RUN_REPORT}"

      - uses: actions/setup-python@v5
        if: steps.collect_guard.outputs.run_collect == 'true' || steps.daily_guard.outputs.run_report == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.collect_guard.outputs.run_collect == 'true' || steps.daily_guard.outputs.run_report == 'true'
        run: python -m pip install -r requirements.txt

      - name: Collect live gate snapshots
        if: steps.collect_guard.outputs.run_collect == 'true'
        run: python -m airport_gate_bot collect --airports "${{ steps.collect_guard.outputs.collect_airports }}"

      - name: Build yesterday report from collected live gates
        if: steps.daily_guard.outputs.run_report == 'true'
        shell: bash
        run: |
          REPORT_DATE="${{ github.event.inputs.report_date }}"

          if [ -z "$REPORT_DATE" ]; then
            REPORT_DATE="yesterday"
          fi

          python -m airport_gate_bot daily-report --date "$REPORT_DATE" --airports SVO,VKO,DME

      - name: Save collected data and reports
        shell: bash
        run: |
          git config user.name "airport-gate-bot"
          git config user.email "airport-gate-bot@users.noreply.github.com"
          git add data outputs || true
          if ! git diff --cached --quiet; then
            git commit -m "Update airport gate data"
            git push
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: airport-gate-output
          path: |
            data
            outputs
          if-no-files-found: ignore
