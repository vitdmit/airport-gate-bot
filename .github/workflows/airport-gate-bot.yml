name: airport-gate-bot

on:
  schedule:
    # GitHub uses UTC. Try several times per hour because scheduled runs
    # can be delayed or dropped. A guard below keeps only one snapshot per hour.
    - cron: "7,22,37,52 * * * *"
    # 06:00 UTC = 09:00 Moscow: build yesterday's report.
    - cron: "0 6 * * *"
  repository_dispatch:
    types:
      - hourly_collect
  workflow_dispatch:
    inputs:
      mode:
        description: "collect, report, or all"
        required: false
        default: "all"
        type: choice
        options:
          - collect
          - report
          - all
      report_date:
        description: "YYYY-MM-DD, today, or yesterday"
        required: false
        default: "yesterday"

permissions:
  contents: write

concurrency:
  group: airport-gate-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh repository before checks
        shell: bash
        run: git pull --ff-only origin "${GITHUB_REF_NAME:-main}"

      - name: Decide whether this hour needs a snapshot
        id: hourly_guard
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          MODE="${{ github.event.inputs.mode }}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$MODE" = "collect" ] || [ "$MODE" = "all" ] || [ -z "$MODE" ]; then
              echo "run_collect=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_collect=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          DAY="$(TZ=Europe/Moscow date +'%Y-%m-%d')"
          HOUR="$(TZ=Europe/Moscow date +'%Y%m%d_%H')"

          if compgen -G "data/raw/${DAY}/*_${HOUR}*.json" > /dev/null; then
            echo "run_collect=false" >> "$GITHUB_OUTPUT"
            echo "Snapshot already exists for Moscow hour ${HOUR}."
          else
            echo "run_collect=true" >> "$GITHUB_OUTPUT"
            echo "No snapshot for Moscow hour ${HOUR}; collecting."
          fi

      - name: Decide whether to build the daily report
        id: daily_guard
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          EVENT_SCHEDULE="${{ github.event.schedule }}"
          MODE="${{ github.event.inputs.mode }}"
          RUN_REPORT="false"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$MODE" = "report" ] || [ "$MODE" = "all" ]; then
              RUN_REPORT="true"
            fi
          elif [ "$EVENT_NAME" = "schedule" ] && [ "$EVENT_SCHEDULE" = "0 6 * * *" ]; then
            RUN_REPORT="true"
          elif [ "$EVENT_NAME" = "repository_dispatch" ]; then
            MOSCOW_HOUR="$(TZ=Europe/Moscow date +'%H')"
            REPORT_DATE="$(TZ=Europe/Moscow date -d 'yesterday' +'%Y-%m-%d')"
            REPORT_PATH="outputs/gate_report_${REPORT_DATE}_daily.xlsx"

            if [ "$MOSCOW_HOUR" = "09" ] && [ ! -f "$REPORT_PATH" ]; then
              RUN_REPORT="true"
            fi
          fi

          echo "run_report=${RUN_REPORT}" >> "$GITHUB_OUTPUT"
          echo "Daily report needed: ${RUN_REPORT}"

      - uses: actions/setup-python@v5
        if: steps.hourly_guard.outputs.run_collect == 'true' || steps.daily_guard.outputs.run_report == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.hourly_guard.outputs.run_collect == 'true' || steps.daily_guard.outputs.run_report == 'true'
        run: python -m pip install -r requirements.txt

      - name: Collect live gate snapshots
        if: steps.hourly_guard.outputs.run_collect == 'true'
        run: python -m airport_gate_bot collect --airports SVO,VKO,DME

      - name: Build yesterday report from collected live gates
        if: steps.daily_guard.outputs.run_report == 'true'
        shell: bash
        run: |
          REPORT_DATE="${{ github.event.inputs.report_date }}"

          if [ -z "$REPORT_DATE" ]; then
            REPORT_DATE="yesterday"
          fi

          python -m airport_gate_bot daily-report --date "$REPORT_DATE" --airports SVO,VKO,DME

      - name: Save collected data and reports
        shell: bash
        run: |
          git config user.name "airport-gate-bot"
          git config user.email "airport-gate-bot@users.noreply.github.com"
          git add data outputs || true
          if ! git diff --cached --quiet; then
            git commit -m "Update airport gate data"
            git push
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: airport-gate-output
          path: |
            data
            outputs
          if-no-files-found: ignore
